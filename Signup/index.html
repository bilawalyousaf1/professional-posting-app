<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Signup | Create Account</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="../Signup/videos/video3.mp4" type="video/mp4" />
    </video>

    <div class="wrapper">
      <form class="sign-form" id="signupForm">
        <h1 class="heading">Join Us</h1>
        <p
          style="
            text-align: center;
            color: var(--text-dim);
            margin-top: -20px;
            font-size: 0.9rem;
          "
        >
          Start your journey with us today
        </p>

        <div class="input-box">
          <input type="text" id="fullName" placeholder="" required autofocus />
          <label>Full Name</label>
          <i class="fa-solid fa-user"></i>
        </div>

        <div class="input-box">
          <input type="email" id="email" placeholder="" required />
          <label>Email Address</label>
          <i class="fa-regular fa-envelope"></i>
        </div>

        <div class="input-box">
          <input type="password" id="password" placeholder="" required />
          <label>Password</label>
          <i class="show-pass1 fa-solid fa-eye"></i>
          <i class="hide-pass1 fa-solid fa-eye-slash" style="display: none"></i>
          <small class="password-requirements"
            >At least 8 characters with numbers</small
          >
        </div>

        <div class="input-box">
          <input
            type="password"
            id="confirm-password"
            placeholder=""
            required
          />
          <label>Confirm Password</label>
          <i class="show-pass2 fa-solid fa-eye"></i>
          <i class="hide-pass2 fa-solid fa-eye-slash" style="display: none"></i>
        </div>

        <button type="submit" class="signup-btn">Create Account</button>

        <p class="account-text">
          Already have an account?
          <a href="../Login/index.html">Log in</a>
        </p>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../theme.js"></script>
    <script src="script.mjs" type="module"></script>
  </body>
</html>
